<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CYC Management | Welcome Aul!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="loginGate" class="admin-card mx-auto mt-5" style="max-width: 400px;">
        <h3 class="fw-bold mb-4 text-center">CYC Access</h3>
        <input type="email" id="user" class="form-control mb-2" placeholder="Email">
        <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-dark w-100" onclick="adminLogin()">Enter Dashboard</button>
    </div>

    <div id="dashboard" class="container hidden mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h2 class="fw-bold">CYC Management | Welcome Aul!</h2>
            <button class="btn btn-sm btn-outline-danger" onclick="adminLogout()">Logout</button>
        </div>

        <div class="row g-4">
            <!-- LEFT COLUMN: Forms -->
            <div class="col-md-5">
                <!-- Link Editor -->
                <div id="link-editor-card" class="admin-card mb-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-link-45deg"></i> Link Editor</h5>
                    <p class="small text-muted mb-3">Manage the social/navigation links shown on the main page.</p>
                    <form onsubmit="saveLink(event)">
                        <input type="hidden" id="link-id">
                        <div class="mb-2">
                            <label class="small fw-bold">TITLE</label>
                            <input type="text" id="link-title" class="form-control"
                                placeholder="e.g. Career Hacks on LinkedIn" required>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">URL</label>
                            <input type="text" id="link-url" class="form-control" placeholder="https://..." required>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">ICON (Bootstrap Icons class)</label>
                            <input type="text" id="link-icon" class="form-control" placeholder="bi-linkedin"
                                value="bi-link-45deg">
                            <div class="form-text">Use <a href="https://icons.getbootstrap.com/"
                                    target="_blank">Bootstrap Icons</a> class name</div>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">TYPE</label>
                            <select id="link-type" class="form-select" onchange="toggleInternalFields()">
                                <option value="external">External Link</option>
                                <option value="internal">Internal Page</option>
                            </select>
                        </div>
                        <div id="internal-fields" style="display:none;">
                            <div class="mb-2">
                                <label class="small fw-bold">INTERNAL TARGET</label>
                                <select id="link-internal-target" class="form-select">
                                    <option value="">-- Select --</option>
                                    <option value="freebies">Freebies</option>
                                    <option value="gear">Gear</option>
                                    <option value="consultation">Consultation</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <label class="small fw-bold">BACKGROUND COLOR</label>
                                <input type="text" id="link-style-bg" class="form-control" placeholder="#f1f3f5">
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">DISPLAY ORDER</label>
                            <input type="number" id="link-order" class="form-control" value="0" min="0">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" id="link-active" class="form-check-input" checked>
                            <label for="link-active" class="form-check-label small fw-bold">Active (visible on
                                site)</label>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Save Link</button>
                        <button type="button" class="btn btn-link w-100 text-muted small mt-2"
                            onclick="document.getElementById('link-id').value=''; this.closest('form').reset(); document.getElementById('link-active').checked=true;">Cancel
                            / Reset</button>
                    </form>
                </div>

                <!-- Resource Form -->
                <div class="admin-card">
                    <h5 class="fw-bold mb-3"><i class="bi bi-folder-plus"></i> Add / Edit Resource</h5>
                    <form onsubmit="saveResource(event)">
                        <input type="hidden" id="form-id">
                        <div class="mb-2">
                            <label class="small fw-bold">TARGET TABLE</label>
                            <select id="form-sheet" class="form-select" required>
                                <option value="Freebies">Freebies</option>
                                <option value="Gear">Gear</option>
                            </select>
                        </div>
                        <div class="mb-2"><label class="small fw-bold">TITLE</label><input type="text" id="form-title"
                                class="form-control" required></div>
                        <div class="mb-2"><label class="small fw-bold">DESC / CATEGORY</label><input type="text"
                                id="form-extra" class="form-control"></div>
                        <div class="mb-3"><label class="small fw-bold">URL LINK</label><input type="text" id="form-link"
                                class="form-control" required></div>
                        <button type="submit" class="btn btn-dark w-100">Save to Database</button>
                        <button type="button" class="btn btn-link w-100 text-muted small mt-2"
                            onclick="location.reload()">Cancel / Reset</button>
                    </form>
                </div>
            </div>

            <!-- RIGHT COLUMN: Lists -->
            <div class="col-md-7">
                <!-- Links List -->
                <div class="admin-card mb-4">
                    <h5 class="fw-bold"><i class="bi bi-link-45deg"></i> Homepage Links</h5>
                    <p class="small text-muted">These links appear on the main page (index.html)</p>
                    <div id="list-links"></div>
                </div>

                <!-- Resources List -->
                <div class="admin-card mb-4">
                    <h5 class="fw-bold"><i class="bi bi-folder"></i> Resources List</h5>
                    <h6 class="small fw-bold text-muted mt-3">FREEBIES</h6>
                    <div id="list-freebies" class="mb-2"></div>
                    <h6 class="small fw-bold text-muted mt-3">GEAR</h6>
                    <div id="list-gear"></div>
                </div>

                <!-- Bookings -->
                <div class="admin-card">
                    <h5 class="fw-bold"><i class="bi bi-calendar-check"></i> Consultation Bookings</h5>
                    <div id="list-bookings"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
</body>

</html>
