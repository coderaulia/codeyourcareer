<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYC Management | Welcome Aul!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginGate" class="admin-card mx-auto mt-5" style="max-width: 400px;">
        <h3 class="fw-bold mb-4 text-center">CYC Access</h3>
        <input type="text" id="user" class="form-control mb-2" placeholder="Username">
        <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-dark w-100" onclick="adminLogin()">Enter Dashboard</button>
    </div>

    <div id="dashboard" class="container hidden mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h2 class="fw-bold">CYC Management | Welcome Aul!</h2>
            <button class="btn btn-sm btn-outline-danger" onclick="adminLogout()">Logout</button>
        </div>

        <div class="row g-4">
            <div class="col-md-5">
                <div class="admin-card">
                    <h5 class="fw-bold mb-3">Add / Edit Resource</h5>
                    <form onsubmit="saveResource(event)">
                        <input type="hidden" id="form-id">
                        <div class="mb-2">
                            <label class="small fw-bold">TARGET SHEET</label>
                            <select id="form-sheet" class="form-select" required>
                                <option value="Freebies">Freebies</option>
                                <option value="Gear">Gear</option>
                            </select>
                        </div>
                        <div class="mb-2"><label class="small fw-bold">TITLE</label><input type="text" id="form-title" class="form-control" required></div>
                        <div class="mb-2"><label class="small fw-bold">DESC / CATEGORY</label><input type="text" id="form-extra" class="form-control"></div>
                        <div class="mb-3"><label class="small fw-bold">URL LINK</label><input type="text" id="form-link" class="form-control" required></div>
                        <button type="submit" class="btn btn-dark w-100">Save to Database</button>
                        <button type="button" class="btn btn-link w-100 text-muted small mt-2" onclick="location.reload()">Cancel / Reset</button>
                    </form>
                </div>
            </div>
            
            <div class="col-md-7">
                <div class="admin-card mb-4">
                    <h5 class="fw-bold">Resources List</h5>
                    <div id="list-freebies" class="mb-2"></div>
                    <div id="list-gear"></div>
                </div>
                <div class="admin-card">
                    <h5 class="fw-bold">Consultation Bookings</h5>
                    <div id="list-bookings"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
